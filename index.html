<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perspectives // An Evaluation</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="card-container">
    <!-- Quiz Interface View -->
    <div id="quiz-view">
        <div class="cosmic-progress-bar">
            <div class="cosmic-progress-fill"></div>
        </div>
        <h2 id="question-text" style="margin-bottom: 2rem;"></h2>
        <div id="options-container" style="display: flex; flex-direction: column;"></div>
    </div>

    <!-- Results Interface View -->
    <div id="results-view" style="display: none; opacity: 0; transition: opacity 0.8s ease;">
        <h3 style="text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.2em; margin-bottom: 0.5rem; color: var(--primary-star);">Your Realization Matrix</h3>
        <h1 id="archetype-name" class="archetype-title" style="margin-top: 0; margin-bottom: 1.5rem;"></h1>
        
        <p id="archetype-element" style="font-style: italic; color: var(--accent-gold); margin-bottom: 0.5rem;"></p>
        <p id="archetype-graha" style="font-size: 0.95rem; color: var(--text-muted); margin-bottom: 2rem;"></p>
        
        <hr style="border: 0; border-top: 1px solid var(--border-gold); margin-bottom: 2rem;">
        
        <p id="archetype-desc" style="font-size: 1.1rem; color: var(--text-pure);"></p>
        
        <div style="margin-top: 3rem; padding-top: 1.5rem; border-top: 1px dashed rgba(143,160,181,0.2);">
            <span id="guna-metric" style="font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--primary-star); letter-spacing: 0.1em;"></span>
        </div>
    </div>
</div>
 <button class="share-btn" onclick="generateShareImage()">Generate Story Image</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
